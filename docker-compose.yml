services:
  cita-checker:
    build:
      context: .
      dockerfile: Dockerfile
    image: cita-checker-local:latest
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "5901:5900"
      - "6080:80"
    environment:
      - RESOLUTION=1366x768
      - VNC_PASSWORD=root
    volumes:
      - ./cita-checker.py:/home/nonroot/cita-checker.py
      - ./values.json:/home/nonroot/values.json
