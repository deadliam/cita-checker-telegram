services:
  cita-checker:
    image: bakayarou23/cita-checker:latest
    platform: linux/amd64
    ports:
      - "5901:5900"
      - "6080:80"
    environment:
      - RESOLUTION=1366x768
      - VNC_PASSWORD=root
    volumes:
      - ./cita-checker.py:/home/nonroot/cita-checker.py
      - ./values.json:/home/nonroot/values.json
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - "( until [ -x /home/nonroot/venv/bin/python3 ]; do sleep 2; done; su -s /bin/bash -c 'nohup env DISPLAY=:99 /home/nonroot/venv/bin/python3 /home/nonroot/cita-checker.py >/tmp/cita-checker.out 2>&1 &' nonroot ) >/tmp/cita-launch.log 2>&1 & exec /startup.sh"
