services:
  cita-checker:
    image: bakayarou23/cita-checker:latest
    platform: linux/amd64
    ports:
      - "5901:5900"
      - "6080:80"
    environment:
      - RESOLUTION=1366x768
      - VNC_PASSWORD=root
    volumes:
      - ./cita-checker.py:/home/nonroot/cita-checker.py
      - ./values.json:/home/nonroot/values.json
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      (while [ ! -x /home/nonroot/venv/bin/python ]; do sleep 2; done;
       su - nonroot -c "bash -lc 'cd /home/nonroot && source /home/nonroot/venv/bin/activate &&
       nohup env DISPLAY=:99 python3 cita-checker.py >/tmp/cita-checker.out 2>&1 &'") &
      exec /startup.sh
