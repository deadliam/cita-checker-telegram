services:
  cita-checker:
    image: bakayarou23/cita-checker:latest
    platform: linux/amd64
    ports:
      - "5901:5900"
      - "6080:80"
    environment:
      - RESOLUTION=1366x768
      - VNC_PASSWORD=root
    volumes:
      - ./cita-checker.py:/home/nonroot/cita-checker.py
      - ./values.json:/home/nonroot/values.json

  cita-checker-runner:
    image: bakayarou23/cita-checker:latest
    platform: linux/amd64
    depends_on:
      - cita-checker
    restart: unless-stopped
    volumes:
      - ./cita-checker.py:/home/nonroot/cita-checker.py
      - ./values.json:/home/nonroot/values.json
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - "rm -rf /home/nonroot/venv; python3 -m venv /home/nonroot/venv; /home/nonroot/venv/bin/python3 -m ensurepip --upgrade; /home/nonroot/venv/bin/python3 -m pip install --disable-pip-version-check --upgrade pip setuptools wheel; /home/nonroot/venv/bin/python3 -m pip install --disable-pip-version-check seleniumbase webdriver-manager; if command -v Xvfb >/dev/null 2>&1; then Xvfb :99 -screen 0 1366x768x24 -nolisten tcp >/tmp/xvfb-runner.log 2>&1 & sleep 2; fi; exec env DISPLAY=:99 /home/nonroot/venv/bin/python3 /home/nonroot/cita-checker.py"
