services:
  cita-checker:
    image: bakayarou23/cita-checker:latest
    platform: linux/amd64
    ports:
      - "5901:5900"
      - "6080:80"
    environment:
      - RESOLUTION=1366x768
      - VNC_PASSWORD=root
    volumes:
      - ./cita-checker.py:/home/nonroot/cita-checker.py
      - ./values.json:/home/nonroot/values.json
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - "( su -s /bin/bash -c 'if ! /home/nonroot/venv/bin/python3 -c \"import seleniumbase\" >/dev/null 2>&1; then rm -rf /home/nonroot/venv; /usr/bin/python3 -m venv /home/nonroot/venv; /home/nonroot/venv/bin/python3 -m ensurepip --upgrade >>/tmp/cita-install.log 2>&1 || true; /home/nonroot/venv/bin/python3 -m pip install --disable-pip-version-check -q --upgrade pip setuptools wheel >>/tmp/cita-install.log 2>&1; /home/nonroot/venv/bin/python3 -m pip install --disable-pip-version-check -q seleniumbase webdriver-manager >>/tmp/cita-install.log 2>&1; fi; nohup env DISPLAY=:99 /home/nonroot/venv/bin/python3 /home/nonroot/cita-checker.py >/tmp/cita-checker.out 2>&1 &' nonroot ) >/tmp/cita-launch.log 2>&1 & exec /startup.sh"
